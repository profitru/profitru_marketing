# Example nginx for the static Profitru-Marketing site (multi-page HTML, not an SPA).
# Copy to the server, adjust root paths and TLS paths, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Common 404 causes:
#   - Only index.html was uploaded (missing blog/, amazon-profit-calculator/, logos/, etc.)
#   - server_name / root points at the wrong directory on this host
#   - Using SPA-style try_files ... /index.html for a static multi-folder site (see below)

server {
    listen 443 ssl http2;
    server_name profitru.com www.profitru.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/profitru-marketing;
    index index.html;

    # Serve real files and directory indexes (blog/index.html, amazon-profit-calculator/index.html, …)
    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for versioned assets (HTML references use ?v=…)
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Recommended: one canonical host. Redirect the other TLD so you do not maintain two full uploads.
server {
    listen 443 ssl http2;
    server_name profitru.in www.profitru.in;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    return 301 https://profitru.com$request_uri;
}
